<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="https://static.vecteezy.com/system/resources/thumbnails/044/185/698/small/star-sparkle-icon-futuristic-shapes-christmas-stars-icons-flashes-from-fireworks-png.png" type="image/x-icon">
    <title>404 — SPIN OUTFIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/404.css" />
</head>
<body>
    <div class="bg"></div>

    <!-- Partículas flotantes -->
    <div class="particle" style="left:10%; bottom:20%; --dur:7s; --delay:0s;"></div>
    <div class="particle" style="left:25%; bottom:10%; --dur:9s; --delay:1.5s; background: var(--gold);"></div>
    <div class="particle" style="left:60%; bottom:15%; --dur:8s; --delay:0.8s;"></div>
    <div class="particle" style="left:80%; bottom:25%; --dur:6s; --delay:2s; background: var(--lilac);"></div>
    <div class="particle" style="left:45%; bottom:5%;  --dur:10s; --delay:0.3s;"></div>
    <div class="particle" style="left:90%; bottom:40%; --dur:7s; --delay:3s; background: var(--gold);"></div>

    <!-- Logo arriba -->
    <a class="logo-top" href="/">
        <span class="star">✦</span>
        <span>SPIN OUTFIT</span>
    </a>

    <div class="wrap">
        <div class="num-wrap">
        <p class="num">404</p>
        <span class="spin-icon">✦</span>
        </div>

        <div class="divider"></div>

        <p class="title">Esta página no se encuentra disponible.</p>
        <p class="desc">Lo que buscas no existe o fue movido a otra parte. Vuelve al inicio y sigue girando.</p>

        <a class="btn-home" href="/">
        <span class="arrow">←</span> Volver al inicio
        </a>
    </div>
</body>
</html>
